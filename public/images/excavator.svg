<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Аренда мини-экскаватора">
  <rect width="800" height="600" fill="#F3F4F6"/>
  <rect x="0" y="0" width="800" height="430" fill="#DBEAFE"/>
  <rect x="0" y="430" width="800" height="170" fill="#D6D3D1"/>
  <line x1="0" y1="430" x2="800" y2="430" stroke="#1F2937" stroke-width="3"/>
  <!-- mini-excavator -->
  <g stroke="#1F2937" stroke-width="4" stroke-linejoin="round">
    <!-- tracks -->
    <rect x="140" y="390" width="200" height="45" rx="20" fill="#374151"/>
    <circle cx="170" cy="412" r="14" fill="#1F2937"/>
    <circle cx="310" cy="412" r="14" fill="#1F2937"/>
    <!-- cab -->
    <rect x="170" y="310" width="130" height="80" fill="#F59E0B"/>
    <!-- window -->
    <rect x="240" y="325" width="50" height="40" fill="#BFDBFE" stroke-width="2"/>
    <!-- arm (стрела) -->
    <line x1="295" y1="330" x2="470" y2="270" stroke-width="16" stroke="#D97706"/>
    <line x1="470" y1="270" x2="600" y2="460" stroke-width="14" stroke="#F59E0B"/>
    <!-- bucket (ковш) -->
    <path d="M 580 445 L 640 445 L 635 490 L 575 485 Z" fill="#D97706"/>
  </g>
  <!-- trench (траншея) being dug -->
  <rect x="560" y="455" width="120" height="60" fill="#78716C"/>
  <line x1="560" y1="455" x2="680" y2="455" stroke="#1F2937" stroke-width="3"/>
  <!-- dirt piles -->
  <path d="M 690 455 Q 740 425 780 455 L 780 460 L 690 460 Z" fill="#A8A29E" stroke="#1F2937" stroke-width="2"/>
</svg>
