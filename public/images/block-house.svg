<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Дом из блоков">
  <rect width="800" height="600" fill="#F3F4F6"/>
  <rect x="0" y="0" width="800" height="380" fill="#FEF3C7"/>
  <circle cx="130" cy="100" r="40" fill="#F59E0B" opacity="0.8"/>
  <rect x="0" y="430" width="800" height="170" fill="#E5E7EB"/>
  <!-- house body -->
  <rect x="200" y="220" width="400" height="220" fill="#FDE68A" stroke="#1F2937" stroke-width="4"/>
  <!-- roof -->
  <polygon points="180,222 400,110 620,222" fill="#1F2937" stroke="#1F2937" stroke-width="4" stroke-linejoin="round"/>
  <!-- block rows (кладка из блоков) -->
  <g stroke="#92400E" stroke-width="2" opacity="0.55">
    <line x1="200" y1="270" x2="600" y2="270"/>
    <line x1="200" y1="320" x2="600" y2="320"/>
    <line x1="200" y1="370" x2="600" y2="370"/>
    <line x1="200" y1="420" x2="600" y2="420"/>
    <line x1="260" y1="222" x2="260" y2="270"/>
    <line x1="320" y1="222" x2="320" y2="270"/>
    <line x1="380" y1="222" x2="380" y2="270"/>
    <line x1="440" y1="222" x2="440" y2="270"/>
    <line x1="500" y1="222" x2="500" y2="270"/>
    <line x1="560" y1="222" x2="560" y2="270"/>
    <line x1="230" y1="270" x2="230" y2="320"/>
    <line x1="290" y1="270" x2="290" y2="320"/>
    <line x1="350" y1="270" x2="350" y2="320"/>
    <line x1="410" y1="270" x2="410" y2="320"/>
    <line x1="470" y1="270" x2="470" y2="320"/>
    <line x1="530" y1="270" x2="530" y2="320"/>
    <line x1="590" y1="270" x2="590" y2="320"/>
  </g>
  <!-- door -->
  <rect x="370" y="350" width="60" height="90" fill="#1F2937"/>
  <!-- windows -->
  <rect x="240" y="290" width="70" height="55" fill="#BFDBFE" stroke="#1F2937" stroke-width="3"/>
  <rect x="490" y="290" width="70" height="55" fill="#BFDBFE" stroke="#1F2937" stroke-width="3"/>
</svg>
