<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Каркасный дом">
  <rect width="800" height="600" fill="#F3F4F6"/>
  <!-- sky band -->
  <rect x="0" y="0" width="800" height="380" fill="#DBEAFE"/>
  <!-- sun -->
  <circle cx="670" cy="90" r="42" fill="#F59E0B" opacity="0.85"/>
  <!-- ground -->
  <rect x="0" y="430" width="800" height="170" fill="#E5E7EB"/>
  <rect x="0" y="430" width="800" height="10" fill="#D1D5DB"/>
  <!-- house body -->
  <rect x="210" y="260" width="380" height="180" fill="#FFFFFF" stroke="#1F2937" stroke-width="4"/>
  <!-- roof -->
  <polygon points="190,262 400,140 610,262" fill="#F59E0B" stroke="#1F2937" stroke-width="4" stroke-linejoin="round"/>
  <!-- frame structure (каркас) -->
  <g stroke="#1F2937" stroke-width="3" opacity="0.55">
    <line x1="210" y1="260" x2="210" y2="440"/>
    <line x1="305" y1="260" x2="305" y2="440"/>
    <line x1="400" y1="260" x2="400" y2="440"/>
    <line x1="495" y1="260" x2="495" y2="440"/>
    <line x1="590" y1="260" x2="590" y2="440"/>
    <line x1="210" y1="320" x2="590" y2="320"/>
    <line x1="210" y1="380" x2="590" y2="380"/>
  </g>
  <!-- door -->
  <rect x="370" y="360" width="60" height="80" fill="#1F2937"/>
  <circle cx="418" cy="402" r="3" fill="#F59E0B"/>
  <!-- windows -->
  <rect x="245" y="300" width="70" height="60" fill="#BFDBFE" stroke="#1F2937" stroke-width="3"/>
  <line x1="280" y1="300" x2="280" y2="360" stroke="#1F2937" stroke-width="2"/>
  <line x1="245" y1="330" x2="315" y2="330" stroke="#1F2937" stroke-width="2"/>
  <rect x="485" y="300" width="70" height="60" fill="#BFDBFE" stroke="#1F2937" stroke-width="3"/>
  <line x1="520" y1="300" x2="520" y2="360" stroke="#1F2937" stroke-width="2"/>
  <line x1="485" y1="330" x2="555" y2="330" stroke="#1F2937" stroke-width="2"/>
  <!-- chimney -->
  <rect x="500" y="170" width="26" height="50" fill="#1F2937"/>
</svg>
